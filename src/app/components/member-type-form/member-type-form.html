@if (!memberType()) {
  <h2>Vytvořit nový typ člena</h2>
}

<form (ngSubmit)="submit()">
  <hxt-form-field label="Název typu:">
    <input type="text" [(ngModel)]="name" name="name" />
  </hxt-form-field>

  <h3>Atributy</h3>
  <div cdkDropList (cdkDropListDropped)="drop($event)" class="attributes-list">
    @for (attr of attributes; let i = $index; track attr.id) {
      <div class="attribute-record-wrapper" cdkDrag>
        <span class="drag-handle" cdkDragHandle title="Přetáhni pro změnu pořadí">⠿</span>
        <hxt-button (click)="removeAttribute(i)" appearance="flat" severity="danger">❌</hxt-button>

        <div class="attribute-fields-wrapper">
          <div class="attribute-main-fields">
            <hxt-form-field label="Název">
              <input
                type="text"
                [(ngModel)]="attr.name"
                [name]="'attr-name-' + i"
                placeholder="Název atributu"
              />
            </hxt-form-field>

            <hxt-form-field label="Typ">
              <select
                [(ngModel)]="attr.type"
                [name]="'attr-type-' + i"
                [attr.disabled]="attr.isAutoId ? '' : null"
              >
                <option value="text">Text</option>
                <option value="number">Číslo</option>
                <option value="date">Datum</option>
                <option value="boolean">Checkbox</option>
              </select>
            </hxt-form-field>
          </div>

          <div class="attribute-flags">
            <label class="attr-flag-label">
              <input
                type="checkbox"
                [(ngModel)]="attr.isAutoId"
                [name]="'attr-autoid-' + i"
                (ngModelChange)="onAutoIdChange(attr)"
              />
              🔢 Auto ID
            </label>
            <label class="attr-flag-label">
              <input
                type="checkbox"
                [(ngModel)]="attr.isCreatedAt"
                [name]="'attr-createdat-' + i"
                (ngModelChange)="onCreatedAtChange(attr)"
              />
              🕒 Datum a čas vytvoření
            </label>
          </div>
        </div>

        <div class="cdk-drag-placeholder-spacer" *cdkDragPlaceholder></div>
      </div>
    }
  </div>

  <span class="form-action-buttons-bottom">
    <hxt-button (click)="addAttribute()">➕ Přidat atribut</hxt-button>
    <hxt-button [type]="'submit'" [disabled]="!name">💾 Uložit typ člena</hxt-button>
  </span>
</form>
