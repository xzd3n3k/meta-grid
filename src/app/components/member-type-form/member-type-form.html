@if (!memberType()) {
  <h2>Vytvořit nový typ člena</h2>
}

<form (ngSubmit)="submit()">
  <hxt-form-field label="Název typu:">
    <input type="text" [(ngModel)]="name" name="name" />
  </hxt-form-field>

  <h3>Atributy</h3>

  <div cdkDropList (cdkDropListDropped)="drop($event)" class="attributes-list">
    @for (attr of attributes; let i = $index; track attr.id) {
      <div class="attribute-card" cdkDrag>

        <!-- Hlavní řádek -->
        <div class="attribute-card-main">
          <span class="drag-handle" cdkDragHandle title="Přetáhni pro změnu pořadí">⠿</span>

          <div class="attr-field">
            <label class="attr-label" [for]="'attr-name-' + i">Název</label>
            <input
              [id]="'attr-name-' + i"
              type="text"
              [(ngModel)]="attr.name"
              [name]="'attr-name-' + i"
              placeholder="Název atributu"
              class="attr-input"
            />
          </div>

          <div class="attr-field attr-field--type">
            <label class="attr-label" [for]="'attr-type-' + i">Typ</label>
            <select
              [id]="'attr-type-' + i"
              [(ngModel)]="attr.type"
              [name]="'attr-type-' + i"
              [attr.disabled]="attr.isAutoId ? '' : null"
              (ngModelChange)="onAttrTypeChange(attr)"
              class="attr-select"
            >
              <option value="text">Text</option>
              <option value="number">Číslo</option>
              <option value="date">Datum</option>
              <option value="boolean">Checkbox</option>
              <option value="single-select">Výběr jedné možnosti</option>
              <option value="multi-select">Výběr více možností</option>
            </select>
          </div>

          <hxt-button (click)="removeAttribute(i)" appearance="flat" severity="danger" class="remove-btn">❌</hxt-button>
        </div>

        <!-- Možnosti pro select typy -->
        @if (isSelectType(attr)) {
          <div class="options-section">
            <span class="options-title">Možnosti výběru</span>
            <div class="options-list">
              @for (opt of (attr.options || []); let j = $index; track j) {
                <div class="option-row">
                  <input
                    type="text"
                    [(ngModel)]="attr.options![j]"
                    [name]="'attr-opt-' + i + '-' + j"
                    placeholder="Možnost {{ j + 1 }}"
                    class="attr-input option-input"
                  />
                  <button
                    type="button"
                    (click)="removeOption(attr, j)"
                    class="option-remove-btn"
                    title="Odebrat možnost"
                  >✕</button>
                </div>
              }
            </div>
            <button type="button" (click)="addOption(attr)" class="option-add-btn">
              + Přidat možnost
            </button>
          </div>
        }

        <!-- Příznaky -->
        <div class="attribute-flags">
          <label class="attr-flag-label">
            <input
              type="checkbox"
              [(ngModel)]="attr.isAutoId"
              [name]="'attr-autoid-' + i"
              (ngModelChange)="onAutoIdChange(attr)"
            />
            🔢 Auto ID
          </label>
          <label class="attr-flag-label">
            <input
              type="checkbox"
              [(ngModel)]="attr.isCreatedAt"
              [name]="'attr-createdat-' + i"
              (ngModelChange)="onCreatedAtChange(attr)"
            />
            🕒 Datum vytvoření
          </label>
          <label class="attr-flag-label">
            <input
              type="checkbox"
              [(ngModel)]="attr.visible"
              [name]="'attr-visible-' + i"
            />
            👁️ Viditelný v tabulce
          </label>
        </div>

        <div *cdkDragPlaceholder class="attribute-placeholder"></div>
      </div>
    }
  </div>

  <div class="form-action-buttons-bottom">
    <hxt-button (click)="addAttribute()">➕ Přidat atribut</hxt-button>
    <hxt-button [type]="'submit'" [disabled]="!name">💾 Uložit typ člena</hxt-button>
  </div>
</form>
